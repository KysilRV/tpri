<style>
:root{--bg:#070b14;--panel:#0f172a;--panel2:#111c33;--text:#eef4ff;--muted:#9fb0cc;--line:rgba(148,163,184,.22);--accent:#38bdf8;--violet:#a78bfa;--good:#22c55e;--bad:#ef4444;--gold:#fbbf24}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 15% 0%,rgba(56,189,248,.16),transparent 26%),radial-gradient(circle at 85% 0%,rgba(167,139,250,.16),transparent 24%),linear-gradient(145deg,#050813,#0a1223 50%,#050813);min-height:100vh}.wrap{width:min(1120px,94vw);margin:0 auto}header{position:sticky;top:0;z-index:5;background:rgba(7,11,20,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;padding:20px 0}h1{margin:0;font-size:clamp(25px,3.2vw,42px);letter-spacing:-.03em}.sub{margin-top:8px;color:var(--muted);line-height:1.5}.score{white-space:nowrap;border:1px solid var(--line);border-radius:999px;padding:11px 15px;background:rgba(255,255,255,.05);font-weight:800}.progress{height:10px;background:#0b1220;border-top:1px solid var(--line)}.bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--violet));transition:.25s}main{padding:26px 0 50px}.toolbar{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}.note,.btn{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.05);padding:12px 14px;color:#dce8fb}.btn{cursor:pointer;font-weight:900;color:#fff}.btn:hover{border-color:rgba(56,189,248,.6)}.grid{display:grid;gap:18px}.card{border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,rgba(15,23,42,.96),rgba(12,20,38,.94));box-shadow:0 18px 45px rgba(0,0,0,.27);overflow:hidden}.cardHead{display:flex;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}.qnum{font-weight:950;font-size:1.05rem}.status{color:var(--muted)}.body{padding:18px}.question{background:#091121;border:1px solid var(--line);border-radius:18px;padding:18px 19px;line-height:1.65;font-size:1.06rem}.formula{margin:12px 0;padding:14px 16px;border-radius:15px;background:#050a16;border:1px solid rgba(56,189,248,.18);font-family:Cambria Math,Times New Roman,serif;font-size:1.22rem;color:#f8fbff;overflow-x:auto}.frac{display:inline-grid;grid-template-rows:auto auto;vertical-align:middle;text-align:center;line-height:1.15;margin:0 .18em}.frac span:first-child{border-bottom:1.5px solid currentColor;padding:0 .35em .1em}.frac span:last-child{padding:.1em .35em 0}.warn{margin-top:10px;color:#fde68a;font-size:.95rem}.options{display:grid;gap:12px;margin-top:16px}.opt{text-align:left;border:1px solid var(--line);border-radius:16px;background:#0a1324;color:#eef4ff;padding:14px 16px;font-size:1rem;line-height:1.45;cursor:pointer;transition:.15s}.opt:hover{transform:translateY(-1px);border-color:rgba(56,189,248,.65);background:#0d1b32}.letter{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:999px;background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.35);font-weight:950;margin-right:10px;color:#bae6fd}.opt.good{background:rgba(34,197,94,.16);border-color:rgba(34,197,94,.7)}.opt.bad{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.75)}.feedback{display:none;margin-top:15px;padding:15px 16px;border-radius:18px;background:#07101f;border:1px solid var(--line);line-height:1.6}.feedback.show{display:block}.correct{color:#bbf7d0;font-weight:950;margin-bottom:7px}footer{padding:22px 0 40px;text-align:center;color:var(--muted)}@media(max-width:720px){.top,.cardHead{flex-direction:column}.question{font-size:1rem}.formula{font-size:1.05rem}}
.sourceTag{display:inline-block;margin-bottom:10px;padding:6px 10px;border-radius:999px;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.35);color:#fde68a;font-size:.9rem;font-weight:900}
</style></head><body><header><div class="wrap top"><div><h1>CRI ALL TESTS ONE</h1><div class="sub">Один загальний тест з усіх 4 файлів. Повторні питання залишені, як ти просив.</div></div><div class="score"><span id="score">0</span>/<span id="total">25</span> правильних</div></div><div class="progress"><div class="bar" id="bar"></div></div></header><main class="wrap"><div class="toolbar"><div class="note">Один загальний текстовий тест: усі питання з Cri_test_1, Cri_test_2, Cri_test_3, Cri_test_4. Повтори не видалені.</div><button class="btn" onclick="resetQuiz()">Почати заново</button></div><div id="quiz" class="grid"></div></main><footer>CRI text-only interactive test</footer>
<script>
const QUESTIONS=[{"q": "<div class=\"sourceTag\">Cri_test_1</div>Aké je partikulárne riešenie diofantickej rovnice?<br><div class=\"formula\">(1+z<sup>−1</sup>)X(z) + 9z<sup>−1</sup>Y(z) = 1</div>", "options": ["nemá riešenie", "X(z)=1, Y(z)=1/9", "X(z)=1, Y(z)=9", "X(z)=1, Y(z)=−1/9"], "answer": 3, "explanation": "У діофантовому рівнянні підставляють X(z), Y(z) і прирівнюють коефіцієнти при однакових степенях z⁻¹.", "n": 1, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>V záporných mocninách z bude:<br><div class=\"formula\">G(z) = <span class=\"frac\"><span>9z+2</span><span>z<sup>3</sup>+z+1</span></span></div>", "options": ["<span class=\"frac\"><span>9z<sup>−1</sup>+2z<sup>−3</sup></span><span>1+z<sup>−2</sup>+z<sup>−3</sup></span></span>", "<span class=\"frac\"><span>9z<sup>−1</sup>+2z<sup>−2</sup></span><span>1+z<sup>−2</sup>+z<sup>−3</sup></span></span>", "<span class=\"frac\"><span>9z<sup>−2</sup>+2z<sup>−3</sup></span><span>1+z<sup>−1</sup>+z<sup>−3</sup></span></span>", "<span class=\"frac\"><span>9z<sup>−2</sup>+2z<sup>−3</sup></span><span>1+z<sup>−2</sup>+z<sup>−3</sup></span></span>"], "answer": 3, "explanation": "Для переходу до від’ємних степенів z ділимо чисельник і знаменник на найвищий степінь z у знаменнику.", "n": 2, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Systém je daný funkciou:<br><div class=\"formula\">G(z) = <span class=\"frac\"><span>z+1.6</span><span>(z−0.5)(z+0.8)</span></span></div>Systém G(z) je:", "options": ["stabilný", "nestabilný", "na hranici stability"], "answer": 0, "explanation": "Для дискретної системи дивляться на полюси: стабільно, якщо всі |z| < 1.", "n": 3, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>V kladných mocninách z bude:<br><div class=\"formula\">G(z) = <span class=\"frac\"><span>4z<sup>−2</sup>+z<sup>−3</sup></span><span>1−3z<sup>−3</sup></span></span></div>", "options": ["<span class=\"frac\"><span>4z+1</span><span>z<sup>3</sup>+3</span></span>", "<span class=\"frac\"><span>4z<sup>2</sup>+1</span><span>z<sup>3</sup>−3</span></span>", "<span class=\"frac\"><span>4z+1</span><span>z<sup>3</sup>−3</span></span>", "<span class=\"frac\"><span>4+z</span><span>z<sup>3</sup>−3</span></span>"], "answer": 2, "explanation": "Для переходу до додатних степенів z множимо чисельник і знаменник на відповідний степінь z.", "n": 4, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Aký je počet krokov regulačného procesu pri návrhu deadbeat regulátora bez ohraničenia akčného zásahu?<br><div class=\"formula\">G(s) = <span class=\"frac\"><span>3</span><span>(s+2.5)(s+1.5)</span></span>, T = 1.5 s</div>", "options": ["1", "3", "4", "2"], "answer": 3, "explanation": "У цих завданнях кількість кроків відповідає порядку/затримці дискретизованого об’єкта, як у розв’язаному варіанті.", "n": 5, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div><div class=\"formula\">A(z)=(1−0.2z<sup>−1</sup>)(1+0.97z<sup>−1</sup>)</div>Nestabilná časť polynómu A(z) je:", "options": ["A<sup>−</sup>=(1+0.97z<sup>−1</sup>)", "A<sup>−</sup>=(1−0.2z<sup>−1</sup>)(1+0.97z<sup>−1</sup>)", "A<sup>−</sup>=1", "A<sup>−</sup>=(1−0.2z<sup>−1</sup>)"], "answer": 2, "explanation": "Стабільна/нестабільна частина полінома визначається положенням коренів відносно одиничного кола.", "n": 6, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Ktorá možnosť je správna pre postupnosť transformácií?<br><div class=\"formula\">G(s) → g(t) → g(kT) → Y(z)</div>", "options": ["g(kT) je spojitá impulzná funkcia systému", "g(kT) je diskrétna prechodová funkcia systému", "g(kT) je diskrétna impulzná funkcia systému", "g(kT) je spojitá prechodová funkcia systému"], "answer": 2, "explanation": "g(kT) — це дискретизована послідовність значень імпульсної характеристики.", "n": 7, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Akú funkciu v regulačnom obvode má polynóm S(z)?", "options": ["S(z) je spätnoväzbová časť dynamiky regulátora — spracúva riadenú veličinu", "S(z) je autoregresná časť dynamiky regulátora — počíta akčný zásah", "S(z) nemá žiadnu funkciu v regulačnom obvode", "S(z) je dopredná časť dynamiky regulátora — spracúva žiadanú hodnotu"], "answer": 3, "explanation": "У RST-регуляторі S(z) працює в прямому каналі, Q(z) — у зворотному зв’язку, P(z) — знаменник/авторегресна частина.", "n": 8, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div><div class=\"formula\">G(z)=<span class=\"frac\"><span>z<sup>−1</sup></span><span>1+0.85z<sup>−1</sup></span></span>, &nbsp; G<sub>R</sub>(z)=0.1</div>Aká je charakteristická rovnica pre základný URO?", "options": ["CHR<sub>URO</sub>=1−0.85z<sup>−1</sup>", "CHR<sub>URO</sub>=1+0.95z<sup>−1</sup>", "CHR<sub>URO</sub>=1+0.15z<sup>−1</sup>", "CHR<sub>URO</sub>=1+0.85z<sup>−1</sup>"], "answer": 3, "explanation": "Характеристичне рівняння замкненого контуру береться зі знаменника замкненої системи.", "n": 9, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Aké je zosilnenie systému?<br><div class=\"formula\">G(z)=<span class=\"frac\"><span>0.2z<sup>−1</sup>−0.1z<sup>−2</sup></span><span>1−0.9z<sup>−1</sup></span></span></div>", "options": ["0.1/0.9", "0.1", "1", "−0.1/0.9"], "answer": 2, "explanation": "Зосилення системи знаходять підстановкою z = 1 у G(z), якщо система стійка.", "n": 10, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Aké sú prvé dve hodnoty impulznej funkcie?<br><div class=\"formula\">G(z)=<span class=\"frac\"><span>1</span><span>1+0.4z<sup>−1</sup></span></span></div>", "options": ["g(0)=1, g(1)=−0.4", "g(0)=0, g(1)=0.4", "g(0)=1, g(1)=0.4", "g(0)=0, g(1)=−0.4"], "answer": 0, "explanation": "Перші значення імпульсної функції — це коефіцієнти розкладу G(z) за степенями z⁻¹.", "n": 11, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Pre základný diskrétny uzavretý regulačný obvod platí veta o konečnej hodnote pre riadenú veličinu:", "options": ["y(∞)=lim<sub>z→1</sub> (1−z<sup>−1</sup>)<sup>−1</sup>Y(z)", "y(∞)=lim<sub>z→0</sub> (1−z<sup>−1</sup>)Y(z)", "y(∞)=lim<sub>z→1</sub> (1−z<sup>−1</sup>)Y(z)", "y(∞)=lim<sub>k→∞</sub> Y(z)"], "answer": 2, "explanation": "Використовується теорема кінцевого значення: множник (1−z⁻¹) і границя при z→1.", "n": 12, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Ktorá vlastnosť pre deadbeat regulátory je správna?", "options": ["často sa používajú v praxi", "neukončujú regulačný pochod za minimálny počet krokov", "majú vysokú parametrickú citlivosť, čo je ich nevýhodou", "nemajú vysokú parametrickú citlivosť, čo je ich výhodou"], "answer": 2, "explanation": "Deadbeat-регулятори швидкі, але мають високу параметричну чутливість.", "n": 13, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Ktoré tvrdenie je správne pri zobrazení s-oblasti do z-roviny?", "options": ["pravá časť s-oblasti sa zobrazí na kružnicu s polomerom r=1", "pravá časť s-oblasti sa zobrazí dovnútra kružnice r=1", "pravá časť s-oblasti sa zobrazí mimo kružnice r=1 v s-rovine", "pravá časť s-oblasti sa zobrazí mimo kružnice s polomerom r=1 v z-rovine"], "answer": 3, "explanation": "Зв’язок між областями: z = e^(sT); права півплощина s переходить поза одиничне коло z.", "n": 14, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Aký člen regulačného obvodu zabezpečuje, aby bol akčný zásah definovaný aj v časoch medzi intervalmi vzorkovania?", "options": ["vzorkovač", "regulátor", "prevodník", "tvarovač"], "answer": 3, "explanation": "Тварувач/holder забезпечує визначений акційний вплив між моментами дискретизації.", "n": 15, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Aká je prenosová funkcia regulátora?<br><div class=\"formula\">u(k)=4u(k−1)+3u(k−2)+0.5e(k)+e(k−1)+e(k−2)</div>", "options": ["<span class=\"frac\"><span>0.5+z<sup>−1</sup>−z<sup>−2</sup></span><span>1−4z<sup>−1</sup>−3z<sup>−2</sup></span></span>", "<span class=\"frac\"><span>0.5+z<sup>−1</sup>+z<sup>−2</sup></span><span>1+4z<sup>−1</sup>+3z<sup>−2</sup></span></span>", "<span class=\"frac\"><span>0.5+z<sup>−1</sup>+z<sup>−2</sup></span><span>1−4z<sup>−1</sup>−3z<sup>−2</sup></span></span>", "<span class=\"frac\"><span>0.5−z<sup>−1</sup>+z<sup>−2</sup></span><span>1−4z<sup>−1</sup>−3z<sup>−2</sup></span></span>"], "answer": 2, "explanation": "Передавальна функція отримується з різницевого рівняння через Z-перетворення.", "n": 16, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Aká je diferenčná rovnica regulátora?<br><div class=\"formula\">G<sub>R</sub>(z)=<span class=\"frac\"><span>0.1z−0.4</span><span>z−1</span></span></div>", "options": ["u(k)=u(k−1)+0.1e(k)+0.4e(k−1)", "u(k)=−u(k−1)+0.1e(k)−0.4e(k−1)", "u(k)=u(k−1)−0.1e(k)−0.4e(k−1)", "u(k)=u(k−1)+0.1e(k)−0.4e(k−1)"], "answer": 3, "explanation": "З G_R(z)=U(z)/E(z) множимо на знаменник і переходимо від z⁻¹ до затримок k−1, k−2.", "n": 17, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Aké je partikulárne riešenie diofantickej rovnice?<br><div class=\"formula\">0.9z<sup>−2</sup>X(z)+(1−z<sup>−1</sup>)Y(z)=1</div>", "options": ["X(z)=1/0.9, Y(z)=1+z<sup>−1</sup>", "X(z)=1/0.9, Y(z)=1−z<sup>−1</sup>", "nemá riešenie", "X(z)=0.9, Y(z)=1+z<sup>−1</sup>"], "answer": 0, "explanation": "У діофантовому рівнянні підставляють X(z), Y(z) і прирівнюють коефіцієнти при однакових степенях z⁻¹.", "n": 18, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Spojitý systém je daný stavovým opisom:<br><div class=\"formula\">A = [[0,1], [−0.8,−8.3]], b=[0,1]<sup>T</sup>, c<sup>T</sup>=[1,0], d=0</div>Ktoré tvrdenie je správne?", "options": ["systém je stabilný a je 2. rádu", "systém je stabilný a je 3. rádu", "systém je nestabilný a je 2. rádu", "systém je nestabilný a je 3. rádu"], "answer": 0, "explanation": "Порядок системи дорівнює розміру матриці A; стійкість визначається власними значеннями.", "n": 19, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Aký je Z-obraz pre u(k−5)?", "options": ["z<sup>5</sup>U(z)", "U(z+5)", "U(z−5)", "z<sup>−5</sup>U(z)"], "answer": 3, "explanation": "Затримка на n кроків відповідає множнику z⁻ⁿ.", "n": 20, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Aká je diferenčná rovnica regulátora?<br><div class=\"formula\">G<sub>R</sub>(z)=<span class=\"frac\"><span>0.7+z<sup>−1</sup>+z<sup>−2</sup></span><span>1−2z<sup>−1</sup>−3z<sup>−2</sup></span></span></div>", "options": ["u(k)=2u(k−1)−3u(k−2)+0.7e(k)+e(k−1)+e(k−2)", "u(k)=−2u(k−1)+3u(k−2)+0.7e(k)+e(k−1)+e(k−2)", "u(k)=2u(k−1)+3u(k−2)−0.7e(k)+e(k−1)+e(k−2)", "u(k)=2u(k−1)+3u(k−2)+0.7e(k)+e(k−1)+e(k−2)"], "answer": 3, "explanation": "З G_R(z)=U(z)/E(z) множимо на знаменник і переходимо від z⁻¹ до затримок k−1, k−2.", "n": 21, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Má riadený systém dopravné oneskorenie?<br><div class=\"formula\">G(z)=<span class=\"frac\"><span>7z<sup>−2</sup>+2z<sup>−3</sup></span><span>1−0.5z<sup>−1</sup>+z<sup>−2</sup></span></span></div>", "options": ["ÁNO", "NIE"], "answer": 0, "explanation": "Транспортне запізнення видно за затримкою/множником z⁻ᵈ.", "n": 22, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div><div class=\"formula\">G(z)=<span class=\"frac\"><span>z<sup>−1</sup></span><span>1+0.7z<sup>−1</sup></span></span>, G<sub>R</sub>(z)=0.1</div>Pojednajte o stabilite URO.", "options": ["URO je stabilný", "URO je nestabilný", "URO je na hranici stability"], "answer": 0, "explanation": "Стійкість URO визначається за коренями характеристичного рівняння замкненого контуру.", "n": 23, "source": "Cri_test_1"}, {"q": "<div class=\"sourceTag\">Cri_test_1</div>Určte minimálne stupne neznámych polynómov X(z), Y(z):<br><div class=\"formula\">(1−z<sup>−1</sup>+0.5z<sup>−2</sup>)X(z)+z<sup>−2</sup −</sup>=(1−0.2z<sup>−1</sup>)(1+0.97z<sup>−1</sup>)", "A<sup>−</sup>=(1−0.2z<sup>−1</sup>)"], "answer": 0, "explanation": "Стабільна/нестабільна частина полінома визначається положенням коренів відносно одиничного кола.", "n": 32, "source": "Cri_test_2"}, {"q": "<div class=\"sourceTag\">Cri_test_2</div>Spojitý systém je daný stavovým opisom:<br><div class=\"formula\">A=[[0,1],[−0.2,−1]], b=[0,1]<sup>T</sup>, c<sup>T</sup>=[1,0], d=0</div>Ktoré tvrdenie je správne?", "options": ["systém je stabilný a je 3. rádu", "systém je nestabilný a je 3. rádu", "systém je stabilný a je 2. rádu", "systém je nestabilný a je 2. rádu"], "answer": 2, "explanation": "Порядок системи дорівнює розміру матриці A; стійкість визначається власними значеннями.", "n": 33, "source": "Cri_test_2"}, {"q": "<div class=\"sourceTag\">Cri_test_2</div>Aké je partikulárne riešenie diofantickej rovnice?<br><div class=\"formula\">(1+z<sup>−1</sup>)X(z)+8z<sup>−1</sup>Y(z)=1</div>", "options": ["X(z)=1, Y(z)=1/8", "X(z)=1, Y(z)=8", "nemá riešenie", "X(z)=1, Y(z)=−1/8"], "answer": 3, "explanation": "У діофантовому рівнянні підставляють X(z), Y(z) і прирівнюють коефіцієнти при однакових степенях z⁻¹.", "n": 34, "source": "Cri_test_2"}, {"q": "<div class=\"sourceTag\">Cri_test_2</div>Aký je Z-obraz jednotkového skoku?", "options": ["1−z<sup>−1</sup>", "<span class=\"frac\"><span>z<sup>−1</sup></span><span>1−z<sup>−1</sup></span></span>", "(1−z<sup>−1</sup>)<sup>−1</sup>", "<span class=\"frac\"><span>z−1</span><span>z</span></span>"], "answer": 1, "explanation": "Z-образ одиничного стрибка залежить від прийнятого початку відліку; у тесті використано варіант із файлу.", "n": 35, "source": "Cri_test_2"}, {"q": "<div class=\"sourceTag\">Cri_test_2</div>Ktorý vzťah je správny? T je perióda vzorkovania.", "options": ["z=s<sup>eT</sup>", "z=e<sup>sT</sup>", "s=z<sup>eT</sup>", "s=e<sup>zT</sup>"], "answer": 1, "explanation": "Правильний зв’язок між s- та z-областю: z = e^(sT).", "n": 36, "source": "Cri_test_2"}, {"q": "<div class=\"sourceTag\">Cri_test_2</div>Pre základný diskrétny URO s regulátorom G<sub>R</sub>(z) a systémom G(z) platí veta o konečnej hodnote pre akčný zásah u:", "options": ["u(∞)=lim (1−z<sup>−1</sup>) <span class=\"frac\"><span>G<sub>R</sub>(z)G(z)</span><span>1+G(z)G<sub>R</sub>(z)</span></span> W(z)", "u(∞)=lim (1−z<sup>−1</sup>) <span class=\"frac\"><span>G<sub>R</sub>(z)</span><span>1+G(z)G<sub>R</sub>(z)</span></span> W(z)", "u(∞)=lim (1−z<sup>−1</sup>) <span class=\"frac\"><span>G(z)</span><span>1+G(z)G<sub>R</sub>(z)</span></span> W(z)", "u(∞)=lim (1−z<sup>−1</sup>) <span class=\"frac\"><span>1</span><span>1+G(z)G<sub>R</sub>(z)</span></span> W(z)"], "answer": 1, "explanation": "Використовується теорема кінцевого значення: множник (1−z⁻¹) і границя при z→1.", "n": 37, "source": "Cri_test_2"}, {"q": "<div class=\"sourceTag\">Cri_test_2</div>Má riadený systém G(z) dopravné oneskorenie?<br><div class=\"formula\">G(z)=<span class=\"frac\"><span>0.3z+0.1</span><span>z<sup>3</sup>−0.5z<sup>2</sup>+0.1z</span></span></div>", "options": ["ÁNO", "NIE"], "answer": 1, "explanation": "Транспортне запізнення видно за затримкою/множником z⁻ᵈ.", "n": 38, "source": "Cri_test_2"}, {"q": "<div class=\"sourceTag\">Cri_test_2</div>Aké sú prvé dve hodnoty impulznej funkcie?<br><div class=\"formula\">G(z)=<span class=\"frac\"><span>1</span><span>1−0.4z<sup>−1</sup></span></span></div>", "options": ["g(0)=0, g(1)=0.4", "g(0)=1, g(1)=0.4", "g(0)=1, g(1)=−0.4", "g(0)=0, g(1)=−0.4"], "answer": 1, "explanation": "Перші значення імпульсної функції — це коефіцієнти розкладу G(z) за степенями z⁻¹.", "n": 39, "source": "Cri_test_2"}, {"q": "<div class=\"sourceTag\">Cri_test_2</div>Aká je prenosová funkcia regulátora?<br><div class=\"formula\">u(k)=4u(k−1)+3u(k−2)+0.5e(k)+e(k−1)+e(k−2)</div>", "options": ["<span class=\"frac\"><span>0.5z<sup>2</sup>+z+1</span><span>z<sup>3</sup>−4z−3</span></span>", "<span class=\"frac\"><span>0.5z<sup>2</sup>+z+1</span><span>z<sup>2</sup>+4z+3</span></span>", "<span class=\"frac\"><span>0.5z<sup>2</sup>+z+1</span><span>z<sup>2</sup>−4z+3</span></span>", "<span class=\"frac\"><span>0.5z<sup>2</sup>+z+1</span><span>z<sup>2</sup>−4z−3</span></span>"], "answer": 3, "explanation": "Передавальна функція отримується з різницевого рівняння через Z-перетворення.", "n": 40, "source": "Cri_test_2"}, {"q": "<div class=\"sourceTag\">Cri_test_2</div>Aké je partikulárne riešenie diofantickej rovnice?<br><div class=\"formula\">3z<sup>−2</sup>X(z)+(1−z<sup>−1</sup>)Y(z)=1</div>", "options": ["X(z)=1/3, Y(z)=1+z<sup>−1</sup>", "nemá riešenie", "X(z)=3, Y(z)=1+z<sup>−1</sup>", "X(z)=1/3, Y(z)=1−z<sup>−1</sup>"], "answer": 0, "explanation": "У діофантовому рівнянні підставляють X(z), Y(z) і прирівнюють коефіцієнти при однакових степенях z⁻¹.", "n": 41, "source": "Cri_test_2"}, {"q": "<div class=\"sourceTag\">Cri_test_2</div><div class=\"formula\">G(z)=<span class=\"frac\"><span>z<sup>−1</sup></span><span>1+0.9z<sup>−1</sup></span></span>, G<sub>R</sub>(z)=0.5</div>Pojednajte o stabilite URO.", "options": ["URO je na hranici stability", "URO je stabilný", "URO je nestabilný"], "answer": 2, "explanation": "Стійкість URO визначається за коренями характеристичного рівняння замкненого контуру.", "n": 42, "source": "Cri_test_2"}, {"q": "<div class=\"sourceTag\">Cri_test_2</div>Ktorá možnosť je správna pre postupnosť G(s) → g(t) → g(kT) → Y(z)?", "options": ["g(kT) je spojitá impulzná funkcia systému", "g(kT) je spojitá prechodová funkcia systému", "g(kT) je diskrétna prechodová funkcia systému", "g(kT) je diskrétna impulzná funkcia systému"], "answer": 3, "explanation": "g(kT) — це дискретизована послідовність значень імпульсної характеристики.", "n": 43, "source": "Cri_test_2"}, {"q": "<div class=\"sourceTag\">Cri_test_2</div>Aký je počet krokov regulačného procesu pri návrhu deadbeat regulátora?<br><div class=\"formula\">G(s)=<span class=\"frac\"><span>3</span><span>s<sup>3</sup>+3s<sup>2</sup>+s+1</span></span> e<sup>−1.5s</sup  G<sub>R</sub>(z)=0.1</div>Aká je charakteristická rovnica pre základný URO?", "options": ["CHR<sub>URO</sub>=1−0.5z<sup>−1</sup>", "CHR<sub>URO</sub>=1−0.4z<sup>−1</sup>", "CHR<sub>URO</sub>=1+0.5z<sup>−1</sup>", "CHR<sub>URO</sub>=1−0.1z<sup>−1</sup>"], "answer": 0, "explanation": "Характеристичне рівняння замкненого контуру береться зі знаменника замкненої системи.", "n": 48, "source": "Cri_test_2"}, {"q": "<div class=\"sourceTag\">Cri_test_2</div>Aká je diferenčná rovnica regulátora?<br><div class=\"formula\">G<sub>R</sub>(z)=<span class=\"frac\"><span>0.2+z<sup>−1</sup>+z<sup>−2</sup></span><span>1−z<sup>−1</sup>−3z<sup>−2</sup></span></span></div>", "options": ["u(k)=−u(k−1)+3u(k−2)+0.2e(k)+e(k−1)+e(k−2)", "u(k)=u(k−1)+3u(k−2)+0.2e(k)+e(k−1)+e(k−2)", "u(k)=u(k−1)−3u(k−2)+0.2e(k)+e(k−1)−e(k−2)", "u(k)=−u(k−1)−3u(k−2)+0.2e(k)+e(k−1)+e(k−2)"], "answer": 1, "explanation": "З G_R(z)=U(z)/E(z) множимо на знаменник і переходимо від z⁻¹ до затримок k−1, k−2.", "n": 49, "source": "Cri_test_2"}, {"q": "<div class=\"sourceTag\">Cri_test_2</div>V záporných mocninách z bude:<br><div class=\"formula\">G(z)=<span class=\"frac\"><span>8z</span><span>z<sup>2</sup>+2z−3</span></span></div>", "options": ["<span class=\"frac\"><span>8z<sup>−2</sup></span><span>1+2z<sup>−1</sup>−3z<sup>−2</sup></span></span>", "<span class=\"frac\"><span>8z<sup>−1</sup></span><span>1+3z<sup>−1</sup>−2z<sup>−2</sup></span></span>", "<span class=\"frac\"><span>8z<sup>−1</sup></span><span>1+2z<sup>−1</sup>−3z<sup>−2</sup></span></span>", "<span class=\"frac\"><span>8z<sup>−2</sup></span><span>1+3z<sup>−1</sup>−2z<sup>−2</sup></span></span>"], "answer": 2, "explanation": "Для переходу до від’ємних степенів z ділимо чисельник і знаменник на найвищий степінь z у знаменнику.", "n": 50, "source": "Cri_test_2"}, {"q": "<div class=\"sourceTag\">Cri_test_3</div>Aké sú prvé dve hodnoty impulznej funkcie?<br><div class=\"formula\">G(z)=<span class=\"frac\"><span>1</span><span>1+0.7z<sup>−1</sup></span></span>< 0.5z<sup>2</sup>+0.1z</span></span></div>", "options": ["ÁNO", "NIE"], "answer": 1, "explanation": "Транспортне запізнення видно за затримкою/множником z⁻ᵈ.", "n": 88, "source": "Cri_test_4"}, {"q": "<div class=\"sourceTag\">Cri_test_4</div>Aké sú prvé dve hodnoty impulznej funkcie?<br><div class=\"formula\">G(z)=<span class=\"frac\"><span>1</span><span>1−0.4z<sup>−1</sup></span></span></div>", "options": ["g(0)=0, g(1)=0.4", "g(0)=1, g(1)=0.4", "g(0)=1, g(1)=−0.4", "g(0)=0, g(1)=−0.4"], "answer": 1, "explanation": "Перші значення імпульсної функції — це коефіцієнти розкладу G(z) за степенями z⁻¹.", "n": 89, "source": "Cri_test_4"}, {"q": "<div class=\"sourceTag\">Cri_test_4</div>Aká je prenosová funkcia regulátora?<br><div class=\"formula\">u(k)=4u(k−1)+3u(k−2)+0.5e(k)+e(k−1)+e(k−2)</div>", "options": ["<span class=\"frac\"><span>0.5z<sup>2</sup>+z+1</span><span>z<sup>3</sup>−4z−3</span></span>", "<span class=\"frac\"><span>0.5z<sup>2</sup>+z+1</span><span>z<sup>2</sup>+4z+3</span></span>", "<span class=\"frac\"><span>0.5z<sup>2</sup>+z+1</span><span>z<sup>2</sup>−4z+3</span></span>", "<span class=\"frac\"><span>0.5z<sup>2</sup>+z+1</span><span>z<sup>2</sup>−4z−3</span></span>"], "answer": 3, "explanation": "Передавальна функція отримується з різницевого рівняння через Z-перетворення.", "n": 90, "source": "Cri_test_4"}, {"q": "<div class=\"sourceTag\">Cri_test_4</div>Aké je partikulárne riešenie diofantickej rovnice?<br><div class=\"formula\">3z<sup>−2</sup>X(z)+(1−z<sup>−1</sup>)Y(z)=1</div>", "options": ["X(z)=1/3, Y(z)=1+z<sup>−1</sup>", "nemá riešenie", "X(z)=3, Y(z)=1+z<sup>−1</sup>", "X(z)=1/3, Y(z)=1−z<sup>−1</sup>"], "answer": 0, "explanation": "У діофантовому рівнянні підставляють X(z), Y(z) і прирівнюють коефіцієнти при однакових степенях z⁻¹.", "n": 91, "source": "Cri_test_4"}, {"q": "<div class=\"sourceTag\">Cri_test_4</div><div class=\"formula\">G(z)=<span class=\"frac\"><span>z<sup>−1</sup></span><span>1+0.9z<sup>−1</sup></span></span>, G<sub>R</sub>(z)=0.5</div>Pojednajte o stabilite URO.", "options": ["URO je na hranici stability", "URO je stabilný", "URO je nestabilný"], "answer": 2, "explanation": "Стійкість URO визначається за коренями характеристичного рівняння замкненого контуру.", "n": 92, "source": "Cri_test_4"}, {"q": "<div class=\"sourceTag\">Cri_test_4</div>Ktorá možnosť je správna pre postupnosť G(s) → g(t) → g(kT) → Y(z)?", "options": ["g(kT) je spojitá impulzná funkcia systému", "g(kT) je spojitá prechodová funkcia systému", "g(kT) je diskrétna prechodová funkcia systému", "g(kT) je diskrétna impulzná funkcia systému"], "answer": 3, "explanation": "g(kT) — це дискретизована послідовність значень імпульсної характеристики.", "n": 93, "source": "Cri_test_4"}, {"q": "<div class=\"sourceTag\">Cri_test_4</div>Aký je počet krokov regulačného procesu pri návrhu deadbeat regulátora?<br><div class=\"formula\">G(s)=<span class=\"frac\"><span>3</span><span>s<sup>3</sup>+3s<sup>2</sup>+s+1</span></span> e<sup>−1.5s</sup>, T=1.5s</div>", "options": ["4", "5", "3", "2"], "answer": 0, "explanation": "У цих завданнях кількість кроків відповідає порядку/затримці дискретизованого об’єкта, як у розв’язаному варіанті.", "n": 94, "source": "Cri_test_4"}, {"q": "<div class=\"sourceTag\">Cri_test_4</div>Aké je zosilnenie systému?<br><div class=\"formula\">G(z)=<span class=\"frac\"><span>0.6z<sup>−1</sup></span><span>1−0.4z<sup>−1</sup></span></span></div>", "options": ["−0.4", "1", "−0.6/0.4", "0.6"], "answer": 1, "explanation": "Зосилення системи знаходять підстановкою z = 1 у G(z), якщо система стійка.", "n": 95, "source": "Cri_test_4"}, {"q": "<div class=\"sourceTag\">Cri_test_4</div>V kladných mocninách z bude:<br><div class=\"formula\">G(z)=<span class=\"frac\"><span>7z<sup>−2</sup>+2z<sup>−3</sup></span><span>1+2z<sup>−2</sup>+z<sup>−3</sup></span></span></div>", "options": ["<span class=\"frac\"><span>7z+1</span><span>z<sup>3</sup>+z<sup>2</sup>+1</span></span>", "<span class=\"frac\"><span>7z+2</span><span>z<sup>3</sup>+2z+1</span></span>", "<span class=\"frac\"><span>7z+1</span><span>z<sup>3</sup>+2z+1</span></span>", "<span class=\"frac\"><span>7z+2</span><span>z<sup>3</sup>+2z<sup>2</sup>+1</span></span>"], "answer": 1, "explanation": "Для переходу до додатних степенів z множимо чисельник і знаменник на відповідний степінь z.", "n": 96, "source": "Cri_test_4"}, {"q": "<div class=\"sourceTag\">Cri_test_4</div>Určte minimálne stupne X(z), Y(z):<br><div class=\"formula\">(1−0.2z<sup>−1</sup>+5z<sup>−2</sup>)X(z)+z<sup>−2</sup>(1−z<sup>−2</sup>)Y(z)=1</div>", "options": ["deg(X)=0, deg(Y)=1", "deg(X)=2, deg(Y)=1", "deg(X)=1, deg(Y)=1", "deg(X)=2, deg(Y)=2"], "answer": 0, "explanation": "Мінімальні степені X(z), Y(z) вибираються за найбільшими степенями/затримками у діофантовому рівнянні.", "n": 97, "source": "Cri_test_4"}, {"q": "<div class=\"sourceTag\">Cri_test_4</div><div class=\"formula\">G(z)=<span class=\"frac\"><span>z<sup>−1</sup></span><span>1−0.5z<sup>−1</sup></span></span>, G<sub>R</sub>(z)=0.1</div>Aká je charakteristická rovnica pre základný URO?", "options": ["CHR<sub>URO</sub>=1−0.5z<sup>−1</sup>", "CHR<sub>URO</sub>=1−0.4z<sup>−1</sup>", "CHR<sub>URO</sub>=1+0.5z<sup>−1</sup>", "CHR<sub>URO</sub>=1−0.1z<sup>−1</sup>"], "answer": 0, "explanation": "Характеристичне рівняння замкненого контуру береться зі знаменника замкненої системи.", "n": 98, "source": "Cri_test_4"}, {"q": "<div class=\"sourceTag\">Cri_test_4</div>Aká je diferenčná rovnica regulátora?<br><div class=\"formula\">G<sub>R</sub>(z)=<span class=\"frac\"><span>0.2+z<sup>−1</sup>+z<sup>−2</sup></span><span>1−z<sup>−1</sup>−3z<sup>−2</sup></span></span></div>", "options": ["u(k)=−u(k−1)+3u(k−2)+0.2e(k)+e(k−1)+e(k−2)", "u(k)=u(k−1)+3u(k−2)+0.2e(k)+e(k−1)+e(k−2)", "u(k)=u(k−1)−3u(k−2)+0.2e(k)+e(k−1)−e(k−2)", "u(k)=−u(k−1)−3u(k−2)+0.2e(k)+e(k−1)+e(k−2)"], "answer": 1, "explanation": "З G_R(z)=U(z)/E(z) множимо на знаменник і переходимо від z⁻¹ до затримок k−1, k−2.", "n": 99, "source": "Cri_test_4"}, {"q": "<div class=\"sourceTag\">Cri_test_4</div>V záporných mocninách z bude:<br><div class=\"formula\">G(z)=<span class=\"frac\"><span>8z</span><span>z<sup>2</sup>+2z−3</span></span></div>", "options": ["<span class=\"frac\"><span>8z<sup>−2</sup></span><span>1+2z<sup>−1</sup>−3z<sup>−2</sup></span></span>", "<span class=\"frac\"><span>8z<sup>−1</sup></span><span>1+3z<sup>−1</sup>−2z<sup>−2</sup></span></span>", "<span class=\"frac\"><span>8z<sup>−1</sup></span><span>1+2z<sup>−1</sup>−3z<sup>−2</sup></span></span>", "<span class=\"frac\"><span>8z<sup>−2</sup></span><span>1+3z<sup>−1</sup>−2z<sup>−2</sup></span></span>"], "answer": 2, "explanation": "Для переходу до від’ємних степенів z ділимо чисельник і знаменник на найвищий степінь z у знаменнику.", "n": 100, "source": "Cri_test_4"}]; const letters=['A','B','C','D']; const state=QUESTIONS.map(()=>null); const quiz=document.getElementById('quiz'), scoreEl=document.getElementById('score'), barEl=document.getElementById('bar');
function renderQuiz(){quiz.innerHTML=QUESTIONS.map((q,i)=>`<section class="card" id="q${i}"><div class="cardHead"><div class="qnum">Питання ${q.n||i+1}</div><div class="status" id="st${i}">Не відповіли</div></div><div class="body"><div class="question">${q.q}</div><div class="options">${q.options.map((o,j)=>`<button class="opt" onclick="answer(${i},${j})" data-i="${j}"><span class="letter">${letters[j]}</span>${o}</button>`).join('')}</div><div class="feedback" id="fb${i}"></div></div></section>`).join('')}
function answer(i,j){if(state[i]!==null)return; const q=QUESTIONS[i]; state[i]=j; const card=document.getElementById(`q${i}`); card.querySelectorAll('.opt').forEach(btn=>{btn.disabled=true; const bi=Number(btn.dataset.i); if(bi===q.answer)btn.classList.add('good'); if(bi===j&&bi!==q.answer)btn.classList.add('bad')}); document.getElementById(`st${i}`).textContent=j===q.answer?'Правильно':'Помилка'; const fb=document.getElementById(`fb${i}`); fb.classList.add('show'); fb.innerHTML=`<div class="correct">Правильна відповідь: ${letters[q.answer]} — ${q.options[q.answer]}</div><div><b>Пояснення:</b> ${q.explanation}</div>`; updateScore();}
function updateScore(){const answered=state.filter(v=>v!==null).length; const score=state.reduce((a,v,i)=>a+(v===QUESTIONS[i].answer?1:0),0); scoreEl.textContent=score; barEl.style.width=`${answered/QUESTIONS.length*100}%`;}
function resetQuiz(){for(let i=0;i<state.length;i++)state[i]=null; renderQuiz(); updateScore(); scrollTo({top:0,behavior:'smooth'})} renderQuiz();
</script></body></html>
